version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./indexes:/app/indexes:ro
      - ./data:/app/data:ro
    environment:
      - HASH_BITS=256
      - HASH_DEVICE=cuda
      - EAGER_LOAD=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    build: .
    command: python scripts/demo_gradio.py
    ports:
      - "7860:7860"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./indexes:/app/indexes:ro
      - ./data:/app/data:ro
    environment:
      - HASH_BITS=256
      - HASH_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      api:
        condition: service_healthy
